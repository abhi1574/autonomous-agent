services:
  - type: web
    name: autonomous-agent-backend
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autonomous-agent-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: QDRANT_PORT
        value: "6333"

databases:
  - name: autonomous-agent-db
    plan: free