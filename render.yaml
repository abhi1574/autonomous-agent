services:
  - type: web
    name: autonomous-agent-backend
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autonomous-agent-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: autonomous-agent-workers
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: python run_agents.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autonomous-agent-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: TAVILY_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false

databases:
  - name: autonomous-agent-db
    plan: free